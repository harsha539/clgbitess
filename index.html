const container=document.getElementById("menuContainer");

for(let restaurant in menuData){
let div=document.createElement("div");
div.className="restaurant";
div.innerHTML="<h3>"+restaurant+"</h3>";

for(let category in menuData[restaurant]){
div.innerHTML+="<div class='category'>"+category+"</div>";
menuData[restaurant][category].forEach(item=>{
let safeId = restaurant.replace(/ /g,'')+"-"+item[0].replace(/ /g,'');
div.innerHTML+=`
<div class="item">
<span>${item[0]} - ₹${item[1]}</span>
<div class="qty">
<button onclick="changeQty('${restaurant}','${item[0]}',${item[1]},-1)">-</button>
<span id="qty-${safeId}">0</span>
<button onclick="changeQty('${restaurant}','${item[0]}',${item[1]},1)">+</button>
</div>
</div>`;
});
}
container.appendChild(div);
}

let cart={};

function changeQty(restaurant,item,price,delta){
let key = restaurant+"||"+item;
let safeId = restaurant.replace(/ /g,'')+"-"+item.replace(/ /g,'');
if(!cart[key]) cart[key]={restaurant,item,price,qty:0};
cart[key].qty+=delta;
if(cart[key].qty<=0){
delete cart[key];
document.getElementById("qty-"+safeId).innerText=0;
}else{
document.getElementById("qty-"+safeId).innerText=cart[key].qty;
}
displayCart();
}

function displayCart(){
let cartDiv=document.getElementById("cartItems");
cartDiv.innerHTML="";
let totalAmount=0;
let totalItems=0;

for(let key in cart){
let data=cart[key];
let qty=data.qty;
let price=data.price;
totalAmount+=price*qty;
totalItems+=qty;

cartDiv.innerHTML+=`
<p><b>${data.restaurant}</b><br>
${data.item} x${qty} - ₹${price*qty}</p>`;
}

let service=totalItems*10;
let grand=totalAmount+service;

document.getElementById("total").innerHTML=
"Food Total: ₹"+totalAmount+
"<br>Service Charge: ₹"+service+
"<br><b>Grand Total: ₹"+grand+"</b>";
}

function sendOrder(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
if(name==""||phone==""){alert("Fill details");return;}

let msg="🛵 CLGBITES Order\n\n";
msg+="Name: "+name+"\nPhone: "+phone+"\n\n";

let total=0;
let items=0;

for(let key in cart){
let data=cart[key];
let q=data.qty;
let p=data.price*q;
msg+="Restaurant: "+data.restaurant+"\n";
msg+=data.item+" x"+q+" - ₹"+p+"\n\n";
total+=p;
items+=q;
}

let service=items*10;
let grand=total+service;

msg+="Service: ₹"+service+"\nTotal: ₹"+grand;

let url="https://wa.me/917396018423?text="+encodeURIComponent(msg);
window.open(url,"_blank");
}
