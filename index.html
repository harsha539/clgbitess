
<!DOCTYPE html>

<style>

text-align:center;
}

.container{padding:20px;}

.restaurant{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:6px 0;
}

button{
background:#F4A300;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.qty button{
padding:3px 8px;
margin:0 3px;
}

.cart{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

.category{
margin-top:10px;

color:#1F3C5B;
}
</style>

<body>

<div class="container" id="menuContainer"></div>

const container=document.getElementById("menuContainer");

for(let restaurant in menuData){

let div=document.createElement("div");
div.className="restaurant";
div.innerHTML="<h3>"+restaurant+"</h3>";

for(let category in menuData[restaurant]){

div.innerHTML+="<div class='category'>"+category+"</div>";

menuData[restaurant][category].forEach(item=>{

div.innerHTML+=`
<div class="item">
<span>${item[0]} - ₹${item[1]}</span>
<div class="qty">
<button onclick="changeQty('${item[0]}',${item[1]},-1)">-</button>
<span id="qty-${item[0].replace(/ /g,'')}">0</span>
<button onclick="changeQty('${item[0]}',${item[1]},1)">+</button>
</div>
</div>
`;

});

}

container.appendChild(div);

}

let cart={};

function changeQty(item,price,delta){

if(!cart[item]) cart[item]={price:price,qty:0};

cart[item].qty+=delta;

if(cart[item].qty<=0){
delete cart[item];
document.getElementById("qty-"+item.replace(/ /g,'')).innerText=0;
}else{
document.getElementById("qty-"+item.replace(/ /g,'')).innerText=cart[item].qty;
}

displayCart();
}

function displayCart(){

let cartDiv=document.getElementById("cartItems");
cartDiv.innerHTML="";

let totalAmount=0;
let totalItems=0;

for(let item in cart){

let qty=cart[item].qty;
let price=cart[item].price;

totalAmount+=price*qty;
totalItems+=qty;

cartDiv.innerHTML+=`<p>${item} x${qty} - ₹${price*qty}</p>`;

}

let service=totalItems*10;
let grand=totalAmount+service;

document.getElementById("total").innerHTML=
"Food Total: ₹"+totalAmount+
"<br>Service Charge: ₹"+service+
"<br><b>Grand Total: ₹"+grand+"</b>";

}

function sendOrder(){
let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();

if(name==""||phone==""){alert("Fill details");return;}

let msg="🛵 CLGBITES Order\n\n";
msg+="Name: "+name+"\n";
msg+="Phone: "+phone+"\n\n";

let total=0;
let items=0;

for(let item in cart){

let q=cart[item].qty;
let p=cart[item].price*q;

msg+=item+" x"+q+" - ₹"+p+"\n";

total+=p;
items+=q;

}

let service=items*10;
let grand=total+service;

msg+="\nService: ₹"+service;
msg+="\nTotal: ₹"+grand;

let url="https://wa.me/917396018423?text="+encodeURIComponent(msg);

window.open(url,"_blank");

}

</script>
